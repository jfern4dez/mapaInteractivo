name: Deploy Next.js to Pages

on:
  push:
    branches: ["master"] # Cambia a "master" si tu rama principal se llama master

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps: deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ./todoAlRon/frontend/package-lock.json # Ajusta si tu ruta cambia

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Install dependencies
        run: npm ci
        working-directory: ./todoAlRon/frontend # Ajusta a tu carpeta frontend

      - name: Build Next.js
        run: npm run build
        working-directory: ./todoAlRon/frontend # Ajusta a tu carpeta frontend

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./todoAlRon/frontend/out

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4